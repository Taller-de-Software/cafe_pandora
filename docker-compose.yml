version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=cafe-pandora-secret-key
      - JWT_REFRESH_SECRET=cafe-pandora-refresh-secret
      - PORT=3001
    volumes:
      - backend_data:/app/prisma
    restart: unless-stopped

volumes:
  backend_data:
